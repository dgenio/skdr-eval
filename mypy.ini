[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-xgboost.*]
ignore_missing_imports = True

[mypy-lightgbm.*]
ignore_missing_imports = True

[mypy-seaborn.*]
ignore_missing_imports = True

[mypy-jinja2.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-typer.*]
ignore_missing_imports = True

[mypy-joblib.*]
ignore_missing_imports = True

[mypy-mlflow.*]
ignore_missing_imports = True

[mypy-wandb.*]
ignore_missing_imports = True

[mypy-aim.*]
ignore_missing_imports = True

[mypy-skdr_eval._version]
ignore_missing_imports = True

[mypy-skdr_eval.cli]
disable_error_code = untyped-decorator

# Pydantic's field_validator is untyped without the pydantic mypy plugin (the
# repo uses ignore_missing_imports for pydantic), so the validator decorators
# trip disallow_untyped_decorators. Same treatment as the typer-decorated CLI.
[mypy-skdr_eval.recipes.llm_reranker]
disable_error_code = untyped-decorator

[mypy-skdr_eval]
ignore_missing_imports = False
