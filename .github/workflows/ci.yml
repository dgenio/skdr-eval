name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for setuptools_scm

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Lint with ruff
      run: |
        ruff check src/ tests/ examples/
        ruff format --check src/ tests/ examples/

    - name: Type check with mypy
      run: |
        mypy src/skdr_eval/

    - name: Test with pytest
      run: |
        pytest -v --cov=skdr_eval --cov-report=xml --cov-report=html --cov-report=term-missing

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  examples-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install (default extras only)
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run preflight example
      run: |
        python examples/preflight.py

    - name: Run quickstart example
      run: |
        python examples/quickstart.py

  viz-extra-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install with [viz] extra
      run: |
        python -m pip install --upgrade pip
        pip install -e .[viz]

    - name: Assert [viz] capability is enabled
      run: |
        python -c "import skdr_eval; caps = skdr_eval.get_capabilities(); assert caps['viz'], caps; print('viz capability:', caps['viz'])"

    - name: Run preflight under [viz] extra
      run: |
        python examples/preflight.py

  cli-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install with [cli] extra
      run: |
        python -m pip install --upgrade pip
        pip install -e .[cli]

    - name: skdr-eval CLI smoke (version + doctor on synth parquet)
      run: |
        skdr-eval version
        python -c "import skdr_eval, pathlib; \
            logs, _, _ = skdr_eval.make_synth_logs(n=800, n_ops=3, seed=0); \
            logs.to_parquet('logs.parquet')"
        skdr-eval doctor logs.parquet --json
        skdr-eval validate-schema logs.parquet

  notebooks-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install (dev extras include nbmake)
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Execute Colab quickstart notebooks via nbmake
      run: |
        python -m pytest --nbmake examples/notebooks/ \
          --nbmake-timeout=300 \
          --override-ini="addopts=" \
          -p no:cacheprovider

  use-cases-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install (default extras only)
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run domain use-case scripts
      run: |
        python examples/use_cases/01_ecommerce_ranking.py
        python examples/use_cases/02_ad_targeting.py
        python examples/use_cases/03_healthcare_cate.py
        python examples/use_cases/04_call_routing.py

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Needed for setuptools_scm

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Check package
      run: |
        twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
