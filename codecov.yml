codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        # Hard 80% gate: no threshold slack so the operative floor matches the
        # advertised target. Project target stays on ``auto`` so the patch
        # gate is the only place this number lives.
        target: 80%
        if_ci_failed: error

ignore:
  - "docs"
  - "examples"
  - "tests"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
