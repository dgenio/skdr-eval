codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%
        if_ci_failed: error

ignore:
  - "docs"
  - "examples"
  - "tests"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
